
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Jungle Cat 2025</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #game-container { position: relative; flex-grow: 1; overflow: hidden; cursor: pointer; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* UI Design */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        #menu { pointer-events: auto; text-align: center; background: rgba(0, 0, 0, 0.8); padding: 30px; border-radius: 30px; border: 2px solid #00ffcc; box-shadow: 0 0 30px #00ffcc55; backdrop-filter: blur(10px); }
        h1 { color: #00ffcc; font-size: 48px; margin: 0; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 10px #00ffcc; }
        button { background: #00ffcc; color: #000; border: none; padding: 15px 45px; font-size: 24px; font-weight: bold; cursor: pointer; border-radius: 50px; margin-top: 20px; transition: 0.3s; box-shadow: 0 0 15px #00ffcc; }
        button:hover { transform: scale(1.1); box-shadow: 0 0 25px #00ffcc; }
        
        #score-display { position: absolute; top: 40px; font-size: 80px; color: #fff; font-weight: 900; opacity: 0.5; pointer-events: none; width: 100%; text-align: center; }
        #banner { height: 60px; background: #111; color: #00ffcc; display: flex; align-items: center; justify-content: center; font-weight: bold; border-top: 1px solid #333; letter-spacing: 1px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-display">0</div>
        <div id="ui-layer">
            <div id="menu">
                <h1>Jungle Cat</h1>
                <p style="color: #ccc;">NEON EDITION 2025</p>
                <button onclick="startGame()">ENTER JUNGLE</button>
            </div>
        </div>
        <canvas id="game"></canvas>
    </div>
    <div id="banner">AD: UPGRADE YOUR GEAR AT THE NEON SHOP</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-display');
        const menuEl = document.getElementById('menu');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 60;

        let gameState = 'MENU';
        let score = 0;
        let pipes = [];
        let particles = [];
        let gameSpeed = 4;
        let cat = { x: 100, y: 300, w: 50, h: 40, v: 0, g: 0.5, rotation: 0 };

        function startGame() {
            gameState = 'PLAYING';
            menuEl.parentElement.style.display = 'none';
            score = 0;
            pipes = [];
            cat.y = canvas.height / 2;
            cat.v = 0;
            scoreEl.innerText = "0";
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.size = Math.random() * 5 + 2;
                this.speedX = Math.random() * 6 - 3;
                this.speedY = Math.random() * 6 - 3;
                this.color = color;
                this.alpha = 1;
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.alpha -= 0.02; }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function createExplosion(x, y, color) {
            for(let i=0; i<15; i++) particles.push(new Particle(x, y, color));
        }

        function drawCat() {
            ctx.save();
            ctx.translate(cat.x + cat.w/2, cat.y + cat.h/2);
            cat.rotation = Math.min(Math.PI/4, Math.max(-Math.PI/4, cat.v * 0.05));
            ctx.rotate(cat.rotation);

            // Neon Glow
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#ff00ff";

            // Body
            ctx.fillStyle = "#ff00ff";
            ctx.beginPath();
            ctx.roundRect(-cat.w/2, -cat.h/2, cat.w, cat.h, 15);
            ctx.fill();

            // Ears
            ctx.beginPath();
            ctx.moveTo(-20, -20); ctx.lineTo(-25, -35); ctx.lineTo(-10, -20);
            ctx.moveTo(20, -20); ctx.lineTo(25, -35); ctx.lineTo(10, -20);
            ctx.fill();

            // Eyes (Glowing)
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#00ffcc";
            ctx.fillStyle = "#00ffcc";
            ctx.beginPath(); ctx.arc(-10, -5, 5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(10, -5, 5, 0, Math.PI*2); ctx.fill();
            
            ctx.restore();
        }

        function update() {
            if (gameState !== 'PLAYING') return;

            cat.v += cat.g;
            cat.y += cat.v;

            if (cat.y + cat.h > canvas.height || cat.y < 0) endGame();

            pipes.forEach((p, i) => {
                p.x -= gameSpeed;
                
                // Collision
                if (cat.x + 10 < p.x + 80 && cat.x + cat.w - 10 > p.x &&
                    (cat.y + 10 < p.top || cat.y + cat.h - 10 > p.top + 220)) {
                    endGame();
                }

                if (!p.passed && p.x + 80 < cat.x) {
                    p.passed = true;
                    score++;
                    scoreEl.innerText = score;
                    gameSpeed += 0.1;
                }

                if (p.x < -100) pipes.splice(i, 1);
            });

            if (pipes.length === 0 || pipes[pipes.length-1].x < canvas.width - 350) {
                pipes.push({ x: canvas.width, top: Math.random() * (canvas.height - 400) + 100, passed: false });
            }

            particles.forEach((p, i) => {
                p.update();
                if(p.alpha <= 0) particles.splice(i, 1);
            });
        }

        function endGame() {
            createExplosion(cat.x + cat.w/2, cat.y + cat.h/2, "#ff00ff");
            gameState = 'MENU';
            setTimeout(() => {
                menuEl.parentElement.style.display = 'flex';
            }, 500);
        }

        function draw() {
            // Background Gradient
            let grad = ctx.createLinearGradient(0,0,0, canvas.height);
            grad.addColorStop(0, '#0a0a2e');
            grad.addColorStop(1, '#000000');
            ctx.fillStyle = grad;
            ctx.fillRect(0,0, canvas.width, canvas.height);

            // Draw Pipes with Neon Glow
            pipes.forEach(p => {
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#00ffcc";
                ctx.fillStyle = "#00ffcc";
                ctx.fillRect(p.x, 0, 80, p.top);
                ctx.fillRect(p.x, p.top + 220, 80, canvas.height);
            });

            particles.forEach(p => p.draw());
            drawCat();
            update();
            requestAnimationFrame(draw);
        }

        const flap = (e) => {
            if (gameState === 'PLAYING') {
                cat.v = -9;
                createExplosion(cat.x, cat.y + cat.h, "#00ffcc");
            }
            if(e.type === 'touchstart') e.preventDefault();
        };

        window.addEventListener('mousedown', flap);
        window.addEventListener('touchstart', flap, {passive: false});
        window.addEventListener('keydown', (e) => { if(e.code === 'Space') flap(e); });

        draw();
    </script>
</body>
</html>
