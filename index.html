<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jungle Cat</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #game-container { position: relative; flex-grow: 1; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        #menu { pointer-events: auto; text-align: center; background: rgba(0, 31, 63, 0.9); padding: 30px; border: 3px solid #4DD0E1; border-radius: 20px; }
        button { background: #66BB6A; color: white; border: none; padding: 15px 40px; font-size: 24px; cursor: pointer; border-radius: 10px; font-weight: bold; }
        #score { font-size: 80px; color: white; visibility: hidden; text-shadow: 4px 4px #000; }
        #banner { width: 100%; height: 50px; background: white; text-align: center; line-height: 50px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <h1 id="score">0</h1>
            <div id="menu">
                <h1 style="color:#FFB300;">JUNGLE CAT</h1>
                <button onclick="startGame()">START GAME</button>
            </div>
        </div>
        <canvas id="game"></canvas>
    </div>
    <div id="banner">ADVERTISEMENT SPACE</div>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const menuEl = document.getElementById('menu');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 50;
        let gameState = 'MENU', score = 0, pipes = [], cat = { x: 50, y: 200, w: 40, h: 30, v: 0, g: 0.5 };
        function startGame() { gameState = 'PLAYING'; menuEl.style.display = 'none'; scoreEl.style.visibility = 'visible'; score = 0; pipes = []; cat.y = canvas.height/2; cat.v = 0; }
        function update() {
            if (gameState !== 'PLAYING') return;
            cat.v += cat.g; cat.y += cat.v;
            if (cat.y > canvas.height || cat.y < 0) { gameState = 'MENU'; menuEl.style.display = 'block'; scoreEl.style.visibility = 'hidden'; }
            if (pipes.length === 0 || pipes[pipes.length-1].x < canvas.width - 250) pipes.push({ x: canvas.width, top: Math.random() * (canvas.height - 300) + 50, passed: false });
            pipes.forEach((p, i) => {
                p.x -= 3.5;
                if (cat.x < p.x + 60 && cat.x + cat.w > p.x && (cat.y < p.top || cat.y + cat.h > p.top + 180)) { gameState = 'MENU'; menuEl.style.display = 'block'; scoreEl.style.visibility = 'hidden'; }
                if (!p.passed && p.x < cat.x) { p.passed = true; score++; scoreEl.innerText = score; }
                if (p.x < -70) pipes.splice(i, 1);
            });
        }
        function draw() {
            ctx.fillStyle = '#0074D9'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#FFB300'; ctx.fillRect(cat.x, cat.y, cat.w, cat.h);
            ctx.fillStyle = '#2ECC40'; pipes.forEach(p => { ctx.fillRect(p.x, 0, 60, p.top); ctx.fillRect(p.x, p.top + 180, 60, canvas.height); });
            update(); requestAnimationFrame(draw);
        }
        window.addEventListener('mousedown', () => { if(gameState==='PLAYING') cat.v = -8; });
        window.addEventListener('touchstart', (e) => { if(gameState==='PLAYING') { cat.v = -8; e.preventDefault(); } }, {passive: false});
        draw();
    </script>
</body>
</html>
